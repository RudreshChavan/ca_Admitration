databases:
  - name: dam-db
    plan: free
    databaseName: dam_db

services:
  - type: web
    name: ca-administration
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dam-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
